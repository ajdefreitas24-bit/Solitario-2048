<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solitario 2048</title>
    <link rel="stylesheet" href="Styles/style.css">
</head>
<body>
    <div class="game-container">
        <header>
            <h1>Solitario 2048</h1>
            <div class="scoreboard">
                <div class="score-box">Puntos: <span id="score">0</span></div>
                <button id="reset-btn">Reiniciar</button>
            </div>
        </header>

        <main>
            <section class="deck-area">
                <p>Próxima carta:</p>
                <div id="next-card-container">
                    </div>
            </section>

            <section class="board" id="board">
                <div class="column" data-col="0"></div>
                <div class="column" data-col="1"></div>
                <div class="column" data-col="2"></div>
                <div class="column" data-col="3"></div>
            </section>
        </main>
    </div>

    <script src="Scripts/index.js"></script>
</body>
</html>
